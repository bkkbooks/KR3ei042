body:
  text: 女科先生本有女科傳於世此數條女科未載故存之産後以補氣血為主方用人參三錢當歸一錢川芎五錢荊芥炒黑一錢益母草一錢水煎服有風加柴胡五分有寒加肉桂五分血不淨加炒山楂十個血暈加炮姜五分衄血加麥冬二錢夜熱加地骨皮五分有食加穀芽山楂有痰加白芥子少許余不必胡加胎漏胎動此症氣血兩不足之故方用人參山萸山藥茯苓麥冬各二錢白朮五錢杜仲枸杞甘草各一錢熟地五錢五味子五分歸身三錢水煎服此方不寒不熱安胎之聖藥也胎動為熱不動為寒子懸此乃胎熱子不安身欲立起於胞中若懸起之象倘以氣盛冶之立死矣方用人參茯苓歸身生地各二錢白朮白芍各五錢杜仲黃芩各一錢熟地一兩水煎服此皆利腰臍之藥少加黃芩胎得寒而自定白帶産前無帶也有則難産之兆即幸而順生産後必有血暈之事方用黑豆三合水三碗煎湯二碗入白果十個紅棗十個再煎一碗入熟地一兩山萸山藥薏仁各四錢茯苓三錢澤瀉丹皮各二錢加水二碗煎服一劑止二劑水不白矣亦通治婦人白帶無不神效産婦氣喘腹痛此症少陰受其寒邪而在內之真陽必逼越於上焦上假熱而下真寒也方用平喘祛寒湯人參肉桂各二錢麥冬三錢白朮五錢吳萸一錢一劑喘定二劑痛止必微涼頓服産婦嘔吐下痢此腎水泛溢因腎火之衰也急用補陽之藥入於補陰之中引火歸源水自下行矣方用熟地白朮茯苓各一兩山萸人參各五錢附子車前子各一錢肉桂三分水煎服血崩方用歸身酒炒一錢生地一錢二分蒲黃酒炒地榆酒洗各二分木通丹皮酒炒三七根香附童便浸各五分白朮一錢橘紅七分姜三片酒一杯水一杯煎九分空心服産後大喘大汗此乃邪入於陽明寒變為熱故大喘大汗平人得此病當用白虎湯而産婦氣血大虛何可乎方用補虛降火湯麥冬一兩人參元參各五錢桑葉十四片蘇子五分水煎服此方以麥冬人參補氣元參降火桑葉止汗蘇子定喘助正而不攻邪邪退而不損正實有奇功産後亡陽友狂大抵亡陽之症用藥汗止便有生機宜先止汗而後定狂方用收汗湯人參三兩桑葉二十片麥冬二兩元參一兩青蒿五錢水煎服一劑汗止二劑狂定後改人參麥冬五味子當歸川芎調理此方只可救亡陽之急症一時權宜之計二劑後必須改方産門症瘡方用黃柏炒蚯蚓糞白薇乳香炒去油鉛粉潮腦各三錢輕粉冰片各五分兒茶二錢麝香三分共為細末調勻擦瘡此方治産門瘡最效亦通治諸瘡打死胎用細瓷片為細末或黃酒或溫水調下三錢即出
