body:
  text: 産後編下卷四産後諸症治法誤破尿胞第十八産理不順穩婆不精誤破尿胞膀胱者用參耆為君歸芎為臣桃仁陳皮茯苓為佐豬羊尿胞煎藥百服乃安又方云用生黃絲娟一尺白牡丹皮根當為根皮為末白芨末各二錢水二碗煮至絹爛如飴服之宜靜臥不可作聲名補脬飲神效患淋第十九由産後虛弱熱客於脬中內虛頻數熱則小便淋澀作痛曰淋茅根湯凡産後冷熱淋並治之石膏白茅根各一兩瞿麥白茯苓各五錢葵子人參桃膠滑石各一錢石首魚頭四個燈心水煎入齒末空心服又方治産後小便痛淋血白茅根瞿麥葵子車前子通草以上俱無分量鯉魚齒一百個水煎服亦入齒末按齒末疑均是鯉魚齒便數第二十由脬內素有冷氣因産發動冷氣入脬故也用赤石脂二兩為末空心服又方治小便數及遺尿用益智仁二十八枚為末米飲送下二錢又桑螵散桑螵蛸三十個人參黃耆鹿茸牡蠣赤石脂各三錢為末空心服二錢米飲送下瀉第二十一産後瀉泄非雜症有食泄濕泄水穀注下之論大率氣虛食積與濕也氣虛宜補食積宜消濕則宜燥然惡露未淨遽難驟燥當先服生化湯二三帖化舊生新加茯苓以利水道俟血生然後補氣以消食燥濕以分利水道使無滯澀虛虛之失若産旬日外方論雜症尤當論虛實而治也如痛下清水腹鳴米飲不化者以寒泄治如糞水黃赤肛門作痛以熱泄治之有因飲食過多傷脾成泄氣臭如敗卵以食積治之又有脾氣久虛少食食下即鳴急盡下所食之物方覺快者以虛寒泄治之治法寒則溫之熱則清之脾傷食積分利健脾兼消補虛善為調治無失也産後虛瀉眠昏人不識弱甚形脫危症必用人參二錢白朮茯苓各二錢附子一錢方能回生若脈浮弦按之不鼓即為中寒此蓋陰先亡而陽欲去速宜大補氣血加附子黑薑以回元陽萬勿忽視加減生化湯治産後塊未消患瀉症川芎茯苓各二錢當歸四錢黑薑炙草各五分桃仁十粒蓮子八枚水煎溫服健脾利水生化湯治産後塊已除患瀉症川芎一錢茯苓一錢歸身二錢黑薑四分陳皮炙草各五分人參三錢肉果一個制白朮一錢土炒澤瀉八分寒瀉加乾薑八分寒痛加砂仁炮薑各八分熱瀉加炒黃連八分瀉水腹痛米飲不化加砂仁八分麥芽山楂各一錢瀉有酸噯臭氣加神麯砂仁各八分脾氣久虛瀉出所食物方快以虛寒論瀉水者加蒼朮一錢以燥濕脾氣弱元氣虛必須大補佐消食清熱祛寒藥弱甚形色脫必須第一方參朮苓附必用之藥也諸瀉俱加升麻酒炒蓮子十粒完穀不化第二十二因産後勞倦傷脾而運轉稽遲也名飧泄又飲食太過脾胃受傷亦然俗呼水穀痢是也然産方三日內塊未消化此脾胃衰弱參耆術未可遽加且服生化湯加益智香砂少溫脾氣俟塊消後加參耆術補氣肉果木香砂仁益智溫胃升麻柴胡清胃氣澤瀉茯苓陳皮以利水為上策也加味生化湯治産後三日內完穀不化塊未消者川芎蓋智各一錢當歸四錢茯苓一錢半黑薑炙草各四分桃仁十粒參苓生化湯治産後三日內塊已消穀不化胎前素弱患此症者川芎茯苓白芍炒益智炒各一錢黑薑四分炙草五分人參白朮各二錢土炒肉果一個制當歸二錢瀉水多加澤瀉木通各八分腹痛加砂仁八分渴加麥冬五味子寒瀉加黑薑一錢木香四分食積加神麯麥芽消飯面砂仁山楂消肉食産後瀉痢日久胃氣虛弱完穀不化宜溫助胃氣六君子湯加木香四分肉果一個制痢第二十三産後七日內外患赤白痢裡急後重頻並最為難治欲調氣行血而推蕩痢邪猶患産後元氣虛弱欲滋榮益氣而大補虛弱又助痢之邪惟生化湯減乾薑而代以木香茯苓則善消惡露而兼治痢疾並行而不相悖也再服香連丸以俟一二日後病勢如減可保無虞若産七日外有患褐花色後重頻並虛痢即當加補無疑若産婦稟厚産期已經二十餘日宜服生化湯加連芩厚朴芍藥行積之劑加減生化湯治産後七日內患痢川芎二錢當歸五錢炙草五分桃仁十二粒茯苓一錢陳皮四分木香磨三分紅痢腹痛加砂仁八分青血丸治禁口痢香連為末加蓮肉粉各一兩半和勻為丸酒送下四錢凡産三四日後塊散痢疾少減共十症開後依治一産後久瀉元氣下陷大便不禁肛門如脫宜服六君子湯加木香四分肉果一個制薑汁分二産後瀉痢色黃乃脾土真氣虛損宜服補中益氣湯加木香肉果三産後傷麵食瀉痢宜服生化湯加神麯麥芽四産後傷肉食瀉痢宜服生化湯加山楂砂仁五産後胃氣虛弱瀉痢完穀不化當溫助胃氣宜服六君子湯加木香四分肉果一個制六産後脾胃虛弱四肢浮腫宜服六君子湯加五皮散見後水腫七産後瀉痢無後重但久不止宜服六君子湯加木香肉果八産後赤白痢臍下痛當歸厚朴黃連肉果甘草桃仁川芎九産後久痢色白屬血虛宜四物湯加荊芥人參十産後久痢色赤屬氣虛宜六君子湯加木香肉果霍亂第二十四由勞傷氣血臟腑空虛不能運化食物及感冷風所致陰陽升降不順清濁亂於脾胃冷熱不調邪正相搏上下為霍亂生化六和湯治産後血塊痛未除患霍亂川芎二錢當歸四錢黑薑炙草陳皮藿香各四分砂仁六分茯苓一錢薑三片煎服附子散治産後霍亂吐瀉手足逆冷須無塊痛方可服白朮一錢當歸二錢陳皮黑薑甘草丁香各四分共為末粥飲送下二錢溫中湯治産後霍亂吐瀉不止無塊痛者可服人參茯苓各一錢白朮一錢半當歸二錢厚朴八分黑薑四分草豆蔻六分薑三片水煎服嘔逆不食第二十五産後勞傷臟腑寒邪易乘於腸胃則氣逆嘔吐而不下食也又有瘀血未淨而嘔者亦有痰氣入胃胃口不清而嘔者當隨症調之加減生化湯治産婦嘔逆不食川芎一錢當歸三錢黑薑砂仁藿香各五分淡竹葉七片水煎和薑汁二匙服溫胃丁香散治産後七日外嘔逆不食當歸三錢白朮二錢黑薑丁香各四分人參一錢陳皮炙草前胡藿香各五分薑三片水煎服石蓮散治産婦嘔吐心沖目眩石蓮子去殼去心一兩半白茯苓一兩丁香五分共為細末米飲送下生津益液湯治産婦虛弱口渴氣少由産後血少多汗心內煩不生津液人參麥冬去心茯苓各一兩大棗竹葉浮小麥炙草栝蔞根大渴不止加蘆根咳嗽第二十六治産後七日內外感風寒咳嗽鼻塞聲重惡寒勿用麻黃湯以動汗嗽而脅痛勿用柴胡湯嗽而有聲痰少面赤勿用涼藥凡産有火嗽有痰嗽必須調理半月後方可用涼藥半月前不當用加味生化湯治産後外感風寒咳嗽及鼻塞聲重川芎一錢當歸二錢杏仁十粒桔梗四分知母八分有痰加半夏曲虛弱有汗咳嗽加人參總之産後不可發汗加參安肺生化湯治産後虛弱旬日內外感風寒咳嗽聲重有痰或身熱頭痛及汗多川芎人參知母桑白皮各一錢當歸二錢杏仁十粒去皮尖甘草桔梗各四分半夏七分橘紅三分虛人多痰加竹瀝一杯薑汁半匙按咳嗽論中明示縱有火嗽在半月前猶不得輕用涼藥垂戒綦嚴而第一與第二方中均有知母小注均有外感風寒云云此必於既感之後將蘊而為燥熱不得已而用之小注未及申明如謂不然苟初感既用此涼品其不與前論顯為柄鑿讀者須會前人微意庶不致用古方而自少權衡耳加味四物湯治半月後於嗽有聲痰少者川芎白芍知母瓜蔞仁各一錢生地當歸訶子各二錢冬花六分桔梗甘草鬥令各四分生薑一大片水腫第二十七産後水氣手足浮腫皮膚見光榮色乃脾虛不能制水腎虛不能行水也必以大補氣血為先佐以蒼朮白朮茯苓補脾壅滿用陳皮半夏香附消之虛人加人參木通有熱加黃芩麥冬以清肺金健脾利水補中益氣湯七日外用人參白朮各二錢茯苓白芍各一錢陳皮五分木瓜八分紫蘇木通大腹皮蒼朮厚朴各四分大便不通加郁李仁麻仁各一錢如陰寒邪濕氣傷脾無汗而腫宜薑皮半夏蘇葉加於補氣方以表汗五皮散治産後風濕客傷脾經氣血凝滯以致面目浮虛四肢腫脹氣喘五加皮地骨皮大腹皮茯苓皮薑皮各一錢棗一枚水煎服又云産後惡露不淨停留胞絡致令浮腫若以水氣治之投以甘遂等藥誤矣但服調經散則血行而腫消矣調經散沒藥另研琥珀另研肉桂赤芍當歸各一錢上為細末每服五分薑汁酒各少許調服流注第二十八産後惡露流於腰臂足關節之處或漫腫或結塊久則腫起作痛肢體倦怠急宜用蔥尉法以治外腫內服參歸生化湯以消血滯無緩也未成者消已成者潰蔥尉法用蔥一握炙熱搗爛作餅敷痛處用厚布二三層以尉斗火尉之參歸生化湯川芎黃耆各一錢半當歸人參各二錢馬蹄香二錢肉桂炙草各五分此症若不補氣血節飲食慎起居未有得生者如腫起作痛起居飲食如常是病氣未深形氣未損易治若漫腫微痛起居倦怠飲食不足最難治或未成膿未潰氣血虛也宜服八珍湯憎寒惡寒陽氣虛也宜服十全大補湯補後大熱陰血虛也宜服四物湯加參朮丹皮嘔逆胃氣虛也宜服六君子湯加炮薑乾薑食少體倦脾氣虛也宜服補中益氣湯四肢冷逆小便頻數腎氣虛也補中益氣湯加益智仁一錢神仙回洞散治産後流注惡露日久成腫用此宜導其膿若未補氣血旺不可服此方膨脹第二十九婦人素弱臨産又勞中氣不足胸膈不利而轉運稽遲若産後即服生化湯以消塊止痛又服加參生化湯以健脾胃自無中滿之症其膨脹因傷食而誤消因氣鬱而誤散多食冷物而停留惡露又因血虛大便燥結誤下而愈脹殊不知氣血兩虛血塊消後當大補氣血以補中虛治者若但知傷食宜消氣鬱宜散惡露當攻便結可下則胃氣反損滿悶益增氣不升降濕熱積久遂成膨脹豈知消導坐於補中則脾胃強而所傷食氣消散助血兼行大便自通惡露自行如産後中風氣不足微滿誤服耗氣藥而脹者服補中益氣湯人參當歸白朮各五分白茯苓一錢木香三分川芎白芍蘿蔔子各四分如傷食誤服消導藥成脹或脅下積塊宜服健脾湯人參白朮當歸各三錢白茯苓白芍神麯吳萸各一錢大腹皮陳皮各四分砂仁麥芽各五分如大便不通誤服下藥成脹及腹中作痛宜服養榮生化湯當歸四錢白芍白茯苓人參蓯蓉各一錢陳皮大腹皮香附各五分桃仁十粒制白朮二錢塊痛將藥送四消丸屢誤下須用參歸半斤大便方通膨脹方退凡誤用消食耗氣藥以致絶谷長生活命丹屢效方見傷食條怔忡驚悸第三十由産憂驚勞倦去血過多則心中跳動不安謂之怔忡若惕然震驚心中怯怯如人將捕之狀謂之驚悸治此二症惟調和脾胃志定神清而病愈矣如分娩後血塊未消宜服生化湯且補血行塊血旺則怔定驚平不必加定神定志劑如塊消痛止後患此宜服加減養榮湯當歸川芎各二錢茯神人參棗仁炒麥冬遠志白朮黃耆各一錢炙元肉八枚陳皮炙草各四分薑煎虛煩加竹瀝薑汁去川芎麥冬再加竹茹一團加木香即歸脾湯養心湯治産後心血不定心神不安炙黃耆柏子仁各一錢人參一錢半麥冬一錢八分茯神川芎遠志各八分炙草四分當歸二錢五味十粒薑水煎服骨蒸第三十一宜服保真湯先服清骨散柴胡梅連湯即清骨散作湯速效柴胡前胡黃連烏梅去核各二兩共為末聽用再將豬脊骨一條豬苦膽一個韭菜白十根各一寸同搗成泥入童便一酒盞攪如稀糊入藥末再搗為丸如緑豆大每服三四十丸清湯送下如上膈熱多食後服此方凡男女骨蒸皆可用之不專治産婦保真湯黃耆川芎各六分人參當歸白朮炒麥冬白芍枸杞生地知母各二錢黃連炒黃柏炒地骨皮各六分五味十粒炙草四分天冬一錢棗三枚去核水煎服加味大造湯治骨蒸勞熱若服清骨散梅連丸不效服此方人參當歸山藥枸杞各一兩生地二兩麥冬石斛各八分酒蒸柴胡六錢胡連五錢黃柏炒七分先將麥冬地黃搗爛後入諸藥同搗為丸加蒸紫河車另搗焙乾為末煉蜜丸心痛第三十二此即胃脘痛因胃脘在心之下勞傷風寒及食冷物而作痛俗呼為心痛心可痛乎血不足則怔忡驚悸不安耳若真心痛手足青黑色旦夕死矣治當散胃中之寒氣消胃中之冷物必用生化湯佐消寒食之藥無有不安若綿綿而痛可按止之問無血塊則當論虛而加補也産後心痛腹痛二症相似因寒食與氣上攻於心則心痛下攻於腹則腹痛均用生化湯加肉桂吳萸等溫散之藥也加味生化湯川芎一錢當歸三錢黑薑炙草各五分肉桂吳萸砂仁各八分傷寒食加肉桂吳芋傷麵食加神麯麥芽傷肉食加山楂砂仁大便不通加肉蓯蓉腹痛第三十三先問有塊無塊塊痛只服生化湯調失笑散二錢加元胡一錢無塊則是遇風冷作痛宜服加減生化湯川芎一錢當歸四錢黑薑炙草各四分防風桂枝各七分吳萸六分白蔻五分痛止去之隨傷食物所加如前小腹痛第三十四産後虛中感寒飲冷其寒下攻小腹作痛又有血塊作痛者又産後血虛臍下痛者並治之以加減生化湯川芎一錢當歸三錢黑薑炙草各四分桃仁十粒有塊痛者本方中送前胡散亦治寒痛若無塊但小腹痛亦可按而少止者屬血虛加熟地三錢前胡肉桂各一錢為末名前胡散虛勞第三十五指節冷痛頭汗不止人參當歸各三錢黃耆二錢淡豆豉十粒生薑三片韭白十寸豬腎兩個先將豬腎煮熟取汁煎藥八分溫服遍身疼痛第三十六産後百節開張血脈流散氣弱則經絡間血多阻滯纍日不散則筋牽脈引骨節不利故腰背不能轉側手足不能動履或身熱頭痛若誤作傷寒發表出汗則經脈動蕩手足發冷變症出焉宜服趁痛散當歸桑寄生各一錢甘草黃耆白朮獨活肉桂牛膝各八分薤白五根薑三片水煎服腰痛第三十七由女人腎位系胞腰為腎府産後勞傷腎氣損動胞絡或虛未復而風乘之也養榮壯腎湯治産後感風寒腰痛不可轉當歸二錢防風四分獨活桂心杜仲續斷桑寄生各八分生薑三片水煎服兩帖後痛未止屬腎虛加熟地三錢加味大造丸治産後日久氣血兩虛腰痛腎弱方見骨蒸條青蛾丸胡桃十二個破故紙八兩酒浸炒杜仲一斤薑汁炒去絲為細末煉蜜丸淡醋湯送六十丸脅痛第三八乃肝經血虛氣滯之故氣滯用四君子湯加青皮柴胡血虛用四物湯加柴胡人參白朮若概用香燥之藥則反傷情和之氣無所生矣補肺散治脅痛山萸當歸五味山藥黃耆川芎熟地木瓜白朮獨活棗仁各等分水煎服陰痛第三十九産後起居太早産門感風作痛衣被難近身體宜用祛風定痛湯川芎茯苓各一錢當歸三錢獨活防風肉桂荊芥炒黑各五分地黃二錢棗二枚煎服又附陰疳陰蝕陰中瘡曰𧈟瘡或痛或癢如蟲行狀濃汁淋漓陰蝕幾盡者由心腎煩郁胃氣虛弱致氣血留滯經云諸瘡痛癢皆屬於心治當補心養腎外以藥熏洗宜用十全陰疳散川芎當歸白芍地榆甘草各等分水五碗煎二碗去渣熏日三夜四先熏後洗一方用蒲黃一升水銀二兩二味調勻搽一方用蝦蟆兔糞等為末敷瘡一方治疳蟲食下部及五臟取東南桃枝輕打頭散以綿纏之一方用硫磺末將縛桃枝蘸而燃煙燻之按此條宜與上條合看一方截一短竹筒先納陰中以桃枝燒煙燻之惡露第四十即繫裹兒汙血産時惡露隨下則腹不痛而産自安若腹欠溫暖或傷冷物以致惡露凝塊日久不散則虛證百出或身熱骨蒸食少羸瘦或五心煩熱月水不行其塊在兩脅動則雷鳴嘈雜暈眩發熱似瘧時作時止如此數症治者欲瀉其邪先補其虛必用補中益氣湯送三消丸則元氣不損惡露可消加味補中益氣湯人參黃耆炙白芍各一錢廣皮甘草各四分白朮二錢當歸三錢薑棗煎服三消丸治婦人死血食積痰三等症黃連一兩一半用吳萸煎汁去渣浸炒一半用益智仁炒去益智仁不用萊蔔子一兩五不炒川芎五錢桃仁十粒山梔青皮三稜莪朮各五錢俱用醋炒山楂一兩香附一兩童便浸炒上為末蒸餅為丸食遠服用補中益氣湯送下五六十丸或用白朮三錢陳皮五錢水一鍾煎五分送下亦可乳瘋第四十一乳頭屬足厥陰肝經乳房屬足陽明胃經若乳房癰腫結核色紅數日外腫痛潰稠膿膿盡而愈此屬膽胃熱毒氣血壅滯名曰乳癰易治若初起內結小核不紅不腫不痛積之歲月漸大如巉巖山破如熟榴難治治法痛腫寒熱宜發表散邪痛甚宜疏肝清胃膿成不潰用托裡肌肉不生膿水清稀宜補脾胃膿出及潰惡寒發熱宜補血氣飲食不進或作嘔吐宜補胃氣乳岩初起用益氣養榮湯加歸脾湯間可內消若用行氣補血之劑速亡甚矣瓜蔞散治一切癰疽並治乳癰癰看六腑不和之氣阻滯於陰則生之瓜蔞一個連皮搗爛生甘草青皮乳香燈心炒沒藥燈芯炒各五分當歸金銀花各三錢白芷一錢水煎溫服回脈散乳癰未潰時服此毒從大便出虛人不用大黃三錢半乳香木香沒藥各五分白芷八分穿山甲五分蛤粉拌炒共為末人參二錢煎湯調藥末原為末藥服十全大補揚黃耆熟地人參白朮各三錢茯苓川芎各八分甘草五分金銀花三錢瀉加黃連肉果渴加麥冬五味寒熱往來用馬蹄香搗散凡乳癰服薏苡仁粥好又方用烏藥軟白香辣者五錢研水一碗牛皮膠一片同煎七分溫服如孕婦腹內癰此二方可通用又有乳吹乃小兒飲乳口氣所吹乳汁不通壅結作痛不急治則成癰宜速服瓜蔞散更以手揉散之風甚第四十二用山羊血取色新者於新瓦上焙乾研末老酒衝下五六分為度重者用至八分其效如神又用抱不出殼雞子瓦上焙乾酒調服如治虛寒危症用藍鬚子根刮皮新瓦上焙乾研末溫服一錢為度雖危可保萬全不語第四十三乃惡血停蓄於心故心氣閉塞舌強不語用七珍散人參石菖蒲川芎生地各一兩辰砂研五分防風五錢細辛一錢共為細末用薄荷湯下一錢因痰氣鬱結閉口不語者好明礬一錢水飛過沸湯送下一方治産後不語人參石蓮子去心石菖蒲各等分水煎服婦人良方云産後喑心腎虛不能發聲七珍散脾氣鬱結歸脾湯脾傷食少四君子湯氣血俱虛八珍湯不應獨參湯更不宜當為應急加附子蓋補其血當為氣以生血若單用佛手散等破血藥誤矣産後編終補集産後大便不通用生化湯內減黑薑加麻仁脹滿加陳皮血塊痛加肉桂元胡如燥結十日以上肛門必有燥糞用蜜棗導之煉蜜棗法用好蜜二三兩火煉滾至茶褐色先用濕桌傾蜜在桌上用手作如棗樣插肛門待欲大便去蜜棗方便又方用麻油口含竹管入肛門內吹油四五口腹內糞和即通或豬膽亦可産後雞爪風桑柴灰三錢存性魚膠三錢炒手指甲十二個炒共為末黃精送下取汗即愈保産無憂散當歸酒洗川芎各錢半芥穗炒黑炙黃耆各八分艾葉炒厚朴薑炒各七分枳殼六分麵炒菟絲子一錢四分酒炒羌活甘草各五分川貝母一錢去心白芍錢二分酒炒薑三片溫服上方保胎每月三五服臨産熱服催生如神浮腫治遍體浮腫是脾虛水泛過凡浮腫者可通用俱神效真縮砂仁四兩萊蔔子二兩四錢研末水浸濃取汁浸砂仁候汁盡曬乾研極細末每服一錢漸加至二錢為度淡薑湯送下保産神效方未産能安臨産能催偶傷胎氣腰疼腹痛甚至見紅不止勢欲小産危急之際一服即愈再服全安臨産時交骨不開橫生逆下或子死腹中命在垂危服之奇效全歸酒洗真川芎菟絲子酒泡各一錢五分紫厚朴薑汁炒七分川貝母二錢去心淨煎好方和入枳殼麵炒川羌活各六分荊芥穗黃耆各八分蜜炙炙草蘄艾各五分醋炒白芍一錢二分酒炒冬用二錢生薑三片水二鍾煎八分渣水一鍾煎六分産前空心豫服二劑臨産隨時熱服此乃仙傳奇方慎勿以庸醫輕加減其分兩按保産無憂散保産神效方與編首治産祕驗良方俱相同特引論略別並存參看可也産後編補集卷四終
